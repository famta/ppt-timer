name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pyinstaller
      - name: Build EXE
        run: pyinstaller --onefile --noconsole timer.py
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: PPT-Timer-EXE
          path: dist/timer.exe
